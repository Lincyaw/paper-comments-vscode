name: Build VSIX

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx tsc

      - run: npx @vscode/vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: paper-comments-vsix
          path: "*.vsix"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx @vscode/vsce package

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
